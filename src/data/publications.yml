  title: "BarcodeBERT: Transformers for biodiversity analyses"
  topics:
    - "DNA Foundation Models"
    - "Representation Learning"
  year: 2026
  venue: "Bioinformatics Advances"
  abstract: "Motivation: In the global effort to characterize biodiversity, short species-specific genomic sequences known as DNA barcodes enable fine-grained comparisons among organisms within the same kingdom of life. Although machine learning algorithms specifically designed for the analysis of DNA barcodes are becoming more popular, most existing methodologies rely on generic supervised training algorithms. Results: We introduce BarcodeBERT, a family of models tailored to biodiversity analysis and trained exclusively on data from a reference library of 1.5 M invertebrate DNA barcodes. We evaluate BarcodeBERT on taxonomic identification tasks against a spectrum of machine learning approaches, including supervised training of classical neural architectures and fine-tuning of general DNA foundation models. Our self-supervised pretraining strategies on domain-specific data outperform fine-tuned foundation models, especially in identification tasks involving lower taxa such as genera and species. Compared with BLAST, a widely used sequence-search tool, BarcodeBERT achieves comparable species-level classification accuracy while being 55× faster. Our analysis of masking and tokenization strategies also provides practical guidance for building customized DNA language models, emphasizing the importance of aligning model training strategies with dataset characteristics and domain knowledge."
  links:
    - type: "paper"
      url: "https://doi.org/10.1093/bioadv/vbag054"
      label: "Paper"

- authors:
    - name: "M. Safari"
      highlight: true
  title: "Life at the extremes: Maximally divergent microbes with similar genomic signatures linked to extreme environments"
  topics:
    - "ML in genomics"
  year: 2025
  venue: "Nucleic Acids Research: Genomics and Bioinformatics"
  abstract: "Extreme environments impose strong mutation and selection pressures that drive distinctive, yet understudied, genomic adaptations in extremophiles. In this study, we identify 15 bacterium–archaeon pairs that exhibit highly similar k-mer-based genomic signatures despite maximal taxonomic divergence, suggesting that shared environmental conditions can produce convergent, genome-wide sequence patterns that transcend evolutionary distance. Using a computational pipeline with composite genome proxies, we determine that 6-mers and 100 kbp genome proxy lengths provide the best balance between classification accuracy and computational efficiency. Validation through 3-mer frequency analysis, phenotypic trait comparison, and geographic co-occurrence data confirms that extreme environmental pressures can override traditionally recognized taxonomic components at the whole-genome level, revealing how adaptation to extreme conditions leaves robust, domain-spanning imprints on microbial genomes."
  links:
    - type: "paper"
      url: "https://doi.org/10.1093/nargab/lqaf189"
      label: "Paper"
  highlights:
    - "Invited Podcast – Western Biology & Evolution Seminar Series 2026"